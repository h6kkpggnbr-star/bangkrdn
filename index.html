<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بانگکردن</title>
</head>
<body style="display:flex; justify-content:center; align-items:center; height:100vh;">

    <button id="btn" style="padding:40px; font-size:30px; cursor:pointer; background:red; color:white; border-radius:10px;">بانگکردن!</button>

    <script>
        const btn = document.getElementById('btn');
        const audio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');

        btn.addEventListener('click', async () => {
            // هەوڵدان بۆ لێدانی دەنگ
            audio.play();
            
            // داوای ڕێگەپێدان بۆ نۆتیفیکەیشن
            try {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    new Notification("نان حازرە!", { body: "هەستە وەرە خوارەوە!" });
                }
            } catch (e) {
                console.log("نەتوانرا نۆتیفیکەیشن بنێردرێت");
            }
        });
    </script>
</body>
</html>
