<!DOCTYPE html>
<html>
<body>
    <button onclick="notifyMe()" style="padding:50px; font-size:40px;">نان حازرە!</button>
    <script>
        function notifyMe() {
            if (!("Notification" in window)) {
                alert("ببورە، وێبگەڕەکەت ڕێگەی نادات!");
            } else if (Notification.permission === "granted") {
                for(let i=0; i<5; i++) {
                    new Notification("بانگکردن!", {body: "دایکم دەڵێت نان حازرە!", icon: 'icon.png'});
                }
            } else if (Notification.permission !== "denied") {
                Notification.requestPermission().then(permission => {
                    if (permission === "granted") notifyMe();
                });
            }
        }
    </script>
</body>
</html>
