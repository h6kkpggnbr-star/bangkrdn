<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بانگکردن</title>
</head>
<body style="display:flex; justify-content:center; align-items:center; height:100vh;">

    <button id="btn" style="padding:40px; font-size:30px; cursor:pointer;">بانگکردن</button>

    <script>
        const btn = document.getElementById('btn');

        btn.addEventListener('click', async () => {
            // هەنگاوی یەکەم: داوای رێگەپێدان بکە
            const permission = await Notification.requestPermission();
            
            if (permission === 'granted') {
                // ئەگەر رێگەی پێدرا، ٥ جار نۆتیفیکەیشن بنێرە
                for(let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        new Notification("نان حازرە!", {
                            body: "هەستە وەرە خوارەوە!",
                            icon: 'https://cdn-icons-png.flaticon.com/512/6195/6195699.png'
                        });
                    }, i * 1000); // هەر چرکەیەک جارێک
                }
            } else {
                alert("تکایە لە سێتینگ رێگەی نۆتیفیکەیشن بدە");
            }
        });
    </script>
</body>
</html>
